# Default provider. Use "local", "ollama", "lmstudio", "openai", "gemini", or "openrouter".
provider: local

# Optional LocalAI helper directory. This is only used by the start/stop helper service.
ai_dir: ~/ai

# Provider-specific settings.
providers:
  # OpenAI-compatible local API base URL.
  # Examples: LocalAI, llama.cpp server, or any compatible local server.
  local:
    api_base: http://127.0.0.1:11435
    model: Qwen2.5-Coder-7B-Instruct-Q4_K_M

  # Ollama API base URL without a trailing API path.
  ollama:
    api_base: http://127.0.0.1:11434
    model: qwen2.5-coder:7b

  # LM Studio local server URL without a trailing /v1 path.
  lmstudio:
    api_base: http://127.0.0.1:1234
    model: local-model

  # OpenAI API base URL without a trailing /v1 path.
  openai:
    api_base: https://api.openai.com
    model: gpt-4o-mini
    # Optional OpenAI API key. Prefer OPENAI_API_KEY in your shell for better safety.
    api_key:
    # Optional command that prints the API key, for example: pass show openai
    api_key_cmd:

  # Gemini API base URL without a trailing /v1beta path.
  gemini:
    api_base: https://generativelanguage.googleapis.com
    model: gemini-2.5-flash
    # Optional Gemini API key. Prefer GEMINI_API_KEY in your shell for better safety.
    api_key:
    # Optional command that prints the API key, for example: pass show gemini
    api_key_cmd:

  # OpenRouter API base URL without a trailing /v1 path.
  openrouter:
    api_base: https://openrouter.ai/api
    model: openrouter/auto
    # Optional OpenRouter API key. Prefer OPENROUTER_API_KEY in your shell for better safety.
    api_key:
    # Optional command that prints the API key, for example: pass show openrouter
    api_key_cmd:

# Maximum tokens requested from the model.
max_tokens: 900

# HTTP request timeout in seconds.
timeout: 120

# Activity log file relative to the ComAI install directory.
log_file: logs/comai.log

# Maximum bytes read from each file passed with -f/--file.
file_max_bytes: 24000

# Maximum number of current-directory entries included as context.
dir_context_max: 120

# Regex used to find issue lines in log/error file checks.
error_regex: error|errors|failed|failure|exception|fatal|panic|timeout|warn|warning|traceback

# Regex used to decide whether a file question is asking for a log/error check.
error_intent_regex: error|errors|failed|failure|warning|warnings|problem|problems|issue|issues|wrong|bad|broken|fail|crash|crashed|panic|timeout|traceback|healthy|health|(^|[[:space:]])ok([[:space:]]|$)|okay|check (this )?log|scan (this )?log
