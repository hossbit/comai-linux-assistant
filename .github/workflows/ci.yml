name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck shfmt

      - name: ShellCheck
        run: shellcheck bin/comai lib/comai/*.sh scripts/*.sh

      - name: shfmt
        run: shfmt -d -i 2 -ci -sr bin/comai lib/comai/*.sh scripts/*.sh

      - name: Bats
        run: bats tests
